spring.config.import=optional:file:.env[.properties]

spring.application.name=${MAIN_SERVICE_APP_NAME}
server.port=${PORT:3000}

jwt.secret=${JWT_SECRET}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=${EUREKA_SERVER}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
#eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME}

feign.inventoryservice.project.name=${FEIGN_INVENTORY_SERVICE}

api.gateway.key=${API_GATEWAY_KEY}

app.cors.frontend.allowed-origins=${FRONTEND_ALLOWED_ORIGINS}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api-key=${CLOUDINARY_API_KEY}
cloudinary.api-secret=${CLOUDINARY_API_SECRET}

# multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

general.image.unavailable=${GENERAL_IMAGE_UNAVAILABLE}

# Redis
spring.data.redis.url=${REDIS_URL}
app.redis.stream=${REDIS_STREAM_NAME}
app.redis.group=${REDIS_CONSUMER_GROUP}
app.redis.consumer=${REDIS_CONSUMER_NAME}