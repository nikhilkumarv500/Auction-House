spring.config.import=optional:file:.env[.properties]

spring.application.name=${API_GATEWAY_APP_NAME}
server.port=${PORT:1000}

jwt.secret=${JWT_SECRET}

spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

eureka.client.service-url.defaultZone=${EUREKA_SERVER}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.instance.prefer-ip-address=true
#eureka.instance.hostname=${RENDER_EXTERNAL_HOSTNAME}

feign.mainservice.project.name=${FEIGN_MAIN_SERVICE}
feign.inventoryservice.project.name=${FEIGN_INVENTORY_SERVICE}

app.cors.frontend.allowed-origins=${FRONTEND_ALLOWED_ORIGINS}

api.gateway.key=${API_GATEWAY_KEY}

# multipart
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB